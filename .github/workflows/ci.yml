#
# CI — build + test on every PR and push to master
#
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        build-type: [Release]
        runner:
          - ubuntu-24.04
          - [self-hosted, linux, x64]

    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ !contains(toJSON(matrix.runner), 'ubuntu') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gettext \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.4-dev || \
          sudo apt-get install -y --no-install-recommends \
            build-essential gettext \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click \
            fastapi uvicorn[standard] python-jose[cryptography] bcrypt pydantic httpx

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=ON \
            -DPython3_EXECUTABLE=$(which python)

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

      - name: Run tests (pytest direct)
        run: |
          PYTHONPATH=build/python python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py

  build-and-test-windows:
    name: Windows (${{ matrix.python-version }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-eiskaltdcpp-py-x64-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: vcpkg-eiskaltdcpp-py-x64-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows `
            openssl bzip2 zlib miniupnpc pcre2 lua `
            libiconv libidn2 gettext

      - name: Install SWIG
        run: choco install swig -y --no-progress

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click `
            fastapi "uvicorn[standard]" "python-jose[cryptography]" bcrypt pydantic httpx

      - name: Configure
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_SYSTEM_EISKALTDCPP=OFF `
            -DBUILD_TESTS=ON `
            -DPython3_EXECUTABLE="$(Get-Command python | Select-Object -ExpandProperty Source)"

      - name: Build
        run: cmake --build build

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Run tests (pytest direct)
        run: |
          $env:PYTHONPATH = "build/python"
          python -m pytest tests/ -v --tb=short `
            --ignore=tests/test_integration.py

  build-and-test-macos:
    name: macOS (${{ matrix.python-version }})
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          brew install cmake swig openssl@3 miniupnpc libidn2 pcre2 lua bzip2 gettext

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click \
            fastapi "uvicorn[standard]" "python-jose[cryptography]" bcrypt pydantic httpx

      - name: Configure
        env:
          OPENSSL_ROOT_DIR: /opt/homebrew/opt/openssl@3
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix openssl@3);$(brew --prefix bzip2);$(brew --prefix pcre2);$(brew --prefix miniupnpc);$(brew --prefix libidn2);$(brew --prefix lua);$(brew --prefix gettext)" \
            -DPython3_EXECUTABLE=$(which python)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Run tests (pytest direct)
        run: |
          PYTHONPATH=build/python python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py

  # ─── FreeBSD ──────────────────────────────────────────────────────
  build-and-test-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y cmake swig python311 py311-pip \
              openssl bzip2 miniupnpc libidn2-0 pcre2 lua54 \
              gettext-tools gcc ninja-build
          run: |
            set -e
            python3.11 -m pip install --break-system-packages pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.11)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3.11 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── OpenBSD ──────────────────────────────────────────────────────
  build-and-test-openbsd:
    name: OpenBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in OpenBSD VM
        uses: vmactions/openbsd-vm@v1
        with:
          release: "7.6"
          usesh: true
          prepare: |
            pkg_add cmake swig python-3.11.10 py3-pip \
              bzip2 miniupnpc libidn2 pcre2 lua-5.4.7 \
              gettext-tools ninja
          run: |
            set -e
            pip3.11 install pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.11)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3.11 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── NetBSD ───────────────────────────────────────────────────────
  build-and-test-netbsd:
    name: NetBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in NetBSD VM
        uses: vmactions/netbsd-vm@v1
        with:
          release: "10.1"
          usesh: true
          prepare: |
            pkg_add cmake swig python312 py312-pip \
              bzip2 miniupnpc libidn2 pcre2 lua54 \
              gettext-tools gcc13 ninja-build
          run: |
            set -e
            pip3.12 install pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.12)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3.12 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── DragonflyBSD ─────────────────────────────────────────────────
  build-and-test-dragonflybsd:
    name: DragonflyBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in DragonflyBSD VM
        uses: vmactions/dragonflybsd-vm@v1
        with:
          release: "6.4.0"
          usesh: true
          prepare: |
            pkg install -y cmake swig python311 py311-pip \
              openssl bzip2 miniupnpc libidn2 pcre2 lua54 \
              gettext-tools ninja
          run: |
            set -e
            python3.11 -m pip install pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.11)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3.11 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── OmniOS (illumos/Solaris) ─────────────────────────────────────
  build-and-test-omnios:
    name: OmniOS (illumos)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in OmniOS VM
        uses: vmactions/omnios-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install \
              developer/build/cmake runtime/python-312 \
              developer/swig library/security/openssl-3 \
              library/zlib compress/bzip2 library/pcre2 \
              runtime/lua developer/build/gnu-make \
              developer/gcc14 text/gnu-gettext
          run: |
            set -e
            pip3.12 install pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.12)
            cmake --build build -j$(nproc)
            cd build && ctest --output-on-failure -j$(nproc)
            cd ..
            PYTHONPATH=build/python python3.12 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── Haiku (cross-compile from Linux) ─────────────────────────────
  cross-compile-haiku:
    name: Haiku (cross-compile)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 30

    container:
      image: docker.io/haiku/cross-compiler:x86_64-r1beta4

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host build tools
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake git ca-certificates python3-dev swig gettext

      - name: Cross-compile for Haiku
        run: |
          set -e
          # Haiku cross-compiler sysroot
          SYSROOT=/tools/cross-tools-x86_64
          HAIKU_TRIPLE=x86_64-unknown-haiku

          cat > /tmp/haiku-toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Haiku)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(CMAKE_C_COMPILER   x86_64-unknown-haiku-gcc)
          set(CMAKE_CXX_COMPILER x86_64-unknown-haiku-g++)
          set(CMAKE_FIND_ROOT_PATH /tools/cross-tools-x86_64/sysroot)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

          # Use host Python for SWIG generation, target won't have Python
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/haiku-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=OFF \
            -DPython3_EXECUTABLE=$(which python3) \
            -DPython3_INCLUDE_DIRS=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))") \
            -DPython3_LIBRARIES="" \
            || echo "::warning::CMake configure failed — see log for details"

          cmake --build build -j$(nproc) \
            || echo "::warning::Build failed — see log for details"

  # ─── GNU/Hurd (cross-compile from Linux) ──────────────────────────
  cross-compile-hurd:
    name: GNU/Hurd (cross-compile)
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compiler and dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake git ca-certificates swig python3-dev gettext \
            gcc-i686-linux-gnu g++-i686-linux-gnu \
            libssl-dev:i386 zlib1g-dev:i386 libbz2-dev:i386 || true

          # Hurd cross-compiler is not in Ubuntu repos, fall back to
          # generic i686 Linux cross-compile as a closest approximation.
          # The real value is testing compilation on a 32-bit non-Linux target.

      - name: Cross-compile for i686 (Hurd approximation)
        run: |
          set -e
          PY_INC=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_VER=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LDVERSION'))")
          PY_LIBDIR=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")

          cat > /tmp/hurd-toolchain.cmake <<EOF
          set(CMAKE_SYSTEM_NAME GNU)
          set(CMAKE_SYSTEM_PROCESSOR i686)
          set(CMAKE_C_COMPILER   i686-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER i686-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH /usr/i686-linux-gnu)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY BOTH)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE BOTH)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE BOTH)
          # Force host Python so SWIG wrapper generation works
          set(Python3_EXECUTABLE $(which python3))
          set(Python3_INCLUDE_DIRS ${PY_INC})
          set(Python3_LIBRARIES ${PY_LIBDIR}/libpython${PY_VER}.so)
          set(Python3_VERSION $(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}.{sys.version_info.micro}')"))
          set(Python3_FOUND TRUE)
          EOF

          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/hurd-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=OFF \
            || echo "::warning::CMake configure failed — see log for details"

          cmake --build build -j$(nproc) \
            || echo "::warning::Build failed — see log for details"

  integration:
    name: Integration tests
    needs:
      - build-and-test
      - build-and-test-windows
      - build-and-test-macos
      - build-and-test-freebsd
      - build-and-test-openbsd
      - build-and-test-netbsd
      - build-and-test-dragonflybsd
      - build-and-test-omnios
      - cross-compile-haiku
      - cross-compile-hurd
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    # Network issues with live hubs should not block merging.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gettext \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.4-dev || \
          sudo apt-get install -y --no-install-recommends \
            build-essential gettext \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click \
            fastapi uvicorn[standard] python-jose[cryptography] bcrypt pydantic httpx

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=ON \
            -DPython3_EXECUTABLE=$(which python)
          cmake --build build -j$(nproc)

      - name: Run integration tests
        env:
          PYTHONPATH: build/python
        run: |
          python -m pytest tests/test_integration.py \
            -v --tb=long --timeout=300 -x \
            -o "addopts="
