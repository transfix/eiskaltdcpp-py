#
# CI — build + test on every PR and push to master
#
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        build-type: [Release]
        runner:
          - ubuntu-24.04
          - [self-hosted, linux, x64]

    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ !contains(toJSON(matrix.runner), 'ubuntu') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.4-dev || \
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click \
            fastapi uvicorn[standard] python-jose[cryptography] bcrypt pydantic httpx

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=ON \
            -DPython3_EXECUTABLE=$(which python)

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

      - name: Run tests (pytest direct)
        run: |
          PYTHONPATH=build/python python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py

  build-and-test-windows:
    name: Windows (${{ matrix.python-version }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-eiskaltdcpp-py-x64-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: vcpkg-eiskaltdcpp-py-x64-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows `
            openssl bzip2 zlib miniupnpc pcre2 lua `
            libiconv libidn2

      - name: Install SWIG
        run: choco install swig -y --no-progress

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click `
            fastapi "uvicorn[standard]" "python-jose[cryptography]" bcrypt pydantic httpx

      - name: Configure
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_SYSTEM_EISKALTDCPP=OFF `
            -DBUILD_TESTS=ON `
            -DPython3_EXECUTABLE="$(Get-Command python | Select-Object -ExpandProperty Source)"

      - name: Build
        run: cmake --build build

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Run tests (pytest direct)
        run: |
          $env:PYTHONPATH = "build/python"
          python -m pytest tests/ -v --tb=short `
            --ignore=tests/test_integration.py

  build-and-test-macos:
    name: macOS (${{ matrix.python-version }})
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          brew install cmake swig openssl@3 miniupnpc libidn2 pcre2 lua bzip2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click \
            fastapi "uvicorn[standard]" "python-jose[cryptography]" bcrypt pydantic httpx

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DPython3_EXECUTABLE=$(which python)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Run tests (pytest direct)
        run: |
          PYTHONPATH=build/python python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py

  # ─── FreeBSD ──────────────────────────────────────────────────────
  build-and-test-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake swig python3 py311-pip \
              openssl bzip2 miniupnpc libidn2 pcre2 lua54 \
              gcc ninja
          run: |
            set -e
            python3 -m pip install --break-system-packages pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── OpenBSD ──────────────────────────────────────────────────────
  build-and-test-openbsd:
    name: OpenBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in OpenBSD VM
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg_add cmake swig python3 py3-pip \
              bzip2 miniupnpc libidn2 pcre2 lua--%5.4 \
              gcc ninja
          run: |
            set -e
            pip3 install --break-system-packages pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── NetBSD ───────────────────────────────────────────────────────
  build-and-test-netbsd:
    name: NetBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in NetBSD VM
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          prepare: |
            /usr/sbin/pkg_add cmake swig python312 py312-pip \
              bzip2 miniupnpc libidn2 pcre2 lua54 \
              gcc13 ninja-build
          run: |
            set -e
            pip3.12 install --break-system-packages pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.12)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3.12 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── DragonflyBSD ─────────────────────────────────────────────────
  build-and-test-dragonflybsd:
    name: DragonflyBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in DragonflyBSD VM
        uses: vmactions/dragonflybsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake swig python3 py311-pip \
              openssl bzip2 miniupnpc libidn2 pcre2 lua54 \
              gcc13 ninja
          run: |
            set -e
            pip install --break-system-packages pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3)
            cmake --build build -j$(sysctl -n hw.ncpu)
            cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)
            cd ..
            PYTHONPATH=build/python python3 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  # ─── OmniOS (illumos/Solaris) ─────────────────────────────────────
  build-and-test-omnios:
    name: OmniOS (illumos)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test in OmniOS VM
        uses: vmactions/omnios-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install \
              developer/build/cmake runtime/python-312 \
              developer/swig library/security/openssl-3 \
              library/zlib compress/bzip2 library/pcre2 \
              runtime/lua developer/build/gnu-make \
              developer/gcc14
          run: |
            set -e
            pip3.12 install pytest click
            cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DUSE_SYSTEM_EISKALTDCPP=OFF \
              -DBUILD_TESTS=ON \
              -DPython3_EXECUTABLE=$(which python3.12)
            cmake --build build -j$(nproc)
            cd build && ctest --output-on-failure -j$(nproc)
            cd ..
            PYTHONPATH=build/python python3.12 -m pytest tests/ -v --tb=short \
              --ignore=tests/test_integration.py

  integration:
    name: Integration tests
    needs:
      - build-and-test
      - build-and-test-windows
      - build-and-test-macos
      - build-and-test-freebsd
      - build-and-test-openbsd
      - build-and-test-netbsd
      - build-and-test-dragonflybsd
      - build-and-test-omnios
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    # Network issues with live hubs should not block merging.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.4-dev || \
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake swig python3-dev \
            libssl-dev zlib1g-dev libbz2-dev \
            libminiupnpc-dev libidn2-dev libpcre2-dev \
            liblua5.3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pytest-timeout click \
            fastapi uvicorn[standard] python-jose[cryptography] bcrypt pydantic httpx

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SYSTEM_EISKALTDCPP=OFF \
            -DBUILD_TESTS=ON \
            -DPython3_EXECUTABLE=$(which python)
          cmake --build build -j$(nproc)

      - name: Run integration tests
        env:
          PYTHONPATH: build/python
        run: |
          python -m pytest tests/test_integration.py \
            -v --tb=long --timeout=300 -x \
            -o "addopts="
